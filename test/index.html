<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陀螺儀角色追蹤遊戲</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
        }

        #container {
            width: 100%;
            height: 100%;
            position: relative;
            background: #000;
        }

        #cameraFeed {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            display: none;
            object-fit: cover;
            transform: scaleX(-1);
        }

        #cameraCanvas {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        #glCanvas {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        /* UI層 */
        #uiLayer {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        /* 指引箭頭 */
        .direction-arrow {
            position: absolute;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            filter: drop-shadow(0 0 10px rgba(255, 100, 100, 0.8));
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* 狀態面板 */
        #statusPanel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #0f0;
            padding: 15px;
            border-radius: 8px;
            font-size: 12px;
            font-family: monospace;
            min-width: 250px;
            z-index: 100;
            border: 1px solid #0f0;
        }

        #statusPanel div {
            line-height: 1.8;
            margin: 3px 0;
        }

        #targetInfo {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #0ff;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            min-width: 200px;
            z-index: 100;
            border: 1px solid #0ff;
        }

        .target-found {
            color: #0f0;
            font-weight: bold;
        }

        .target-lost {
            color: #f00;
            font-weight: bold;
        }

        /* 控制按鈕 */
        #controlPanel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 100;
        }

        button {
            padding: 12px 24px;
            border: 2px solid #0f0;
            background: rgba(0, 0, 0, 0.7);
            color: #0f0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
            pointer-events: all;
        }

        button:hover {
            background: rgba(0, 100, 0, 0.5);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
        }

        button:active {
            transform: scale(0.95);
        }

        #permissionRequest {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            z-index: 1000;
            color: #0f0;
            border: 2px solid #0f0;
        }

        #permissionRequest h2 {
            margin-bottom: 20px;
            font-size: 24px;
        }

        #permissionRequest p {
            margin: 15px 0;
            font-size: 16px;
            line-height: 1.6;
        }

        #permissionRequest button {
            margin-top: 20px;
            font-size: 16px;
            padding: 15px 30px;
        }

        .hidden {
            display: none;
        }

        /* 準星標記 */
        #reticle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            border: 2px solid rgba(0, 255, 0, 0.3);
            border-radius: 50%;
            pointer-events: none;
        }

        #reticle::before,
        #reticle::after {
            content: '';
            position: absolute;
            background: rgba(0, 255, 0, 0.3);
        }

        #reticle::before {
            width: 2px;
            height: 20px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        #reticle::after {
            height: 2px;
            width: 20px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div id="container">
        <video id="cameraFeed" playsinline></video>
        <canvas id="cameraCanvas"></canvas>
        <canvas id="glCanvas"></canvas>
        <div id="reticle"></div>
        <div id="uiLayer"></div>

        <div id="statusPanel">
            <div><strong>陀螺儀數據</strong></div>
            <div>方位角(α): <span id="alpha">--</span>°</div>
            <div>傾斜(β): <span id="beta">--</span>°</div>
            <div>旋轉(γ): <span id="gamma">--</span>°</div>
            <div style="margin-top: 10px;"><strong>角色位置</strong></div>
            <div>X: <span id="charX">--</span></div>
            <div>Y: <span id="charY">--</span></div>
            <div>Z: <span id="charZ">--</span></div>
            <div style="margin-top: 10px;"><strong>視野角度</strong></div>
            <div>方向: <span id="viewDir">--</span>°</div>
            <div>距離: <span id="distance">--</span> m</div>
        </div>

        <div id="targetInfo">
            <div id="statusText" class="target-lost">目標: 未偵測</div>
            <div style="margin-top: 10px; font-size: 12px;">
                在視野中旋轉手機找到目標
            </div>
        </div>

        <div id="controlPanel">
            <button id="startBtn">開始遊戲</button>
            <button id="resetBtn">重新生成目標</button>
            <button id="fullscreenBtn">全屏</button>
        </div>

        <div id="permissionRequest" class="hidden">
            <h2>⚠️ 需要權限</h2>
            <p>此遊戲需要以下權限：</p>
            <p>📱 陀螺儀/加速度計</p>
            <p>📷 相機</p>
            <p>請點擊下方按鈕授予權限</p>
            <button id="permissionBtn">授予權限</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ===== 遊戲狀態 =====
        const gameState = {
            isRunning: false,
            targetPosition: { x: 0, y: 0, z: 5 },
            deviceOrientation: { alpha: 0, beta: 0, gamma: 0 },
            cameraDirection: 0,
            isTargetVisible: false,
            targetMesh: null,
            scene: null,
            camera: null,
            renderer: null,
            gyroscopeActive: false
        };

        // ===== UI 更新函數 =====
        function updateStatusDisplay() {
            document.getElementById('alpha').textContent = gameState.deviceOrientation.alpha.toFixed(1);
            document.getElementById('beta').textContent = gameState.deviceOrientation.beta.toFixed(1);
            document.getElementById('gamma').textContent = gameState.deviceOrientation.gamma.toFixed(1);
            document.getElementById('charX').textContent = gameState.targetPosition.x.toFixed(2);
            document.getElementById('charY').textContent = gameState.targetPosition.y.toFixed(2);
            document.getElementById('charZ').textContent = gameState.targetPosition.z.toFixed(2);
            document.getElementById('viewDir').textContent = gameState.cameraDirection.toFixed(1);
            document.getElementById('distance').textContent = calculateDistance().toFixed(2);

            // 更新目標狀態
            const statusText = document.getElementById('statusText');
            if (gameState.isTargetVisible) {
                statusText.textContent = '✓ 目標已偵測！';
                statusText.className = 'target-found';
            } else {
                statusText.textContent = '✗ 目標未偵測';
                statusText.className = 'target-lost';
            }
        }

        function calculateDistance() {
            return Math.sqrt(
                Math.pow(gameState.targetPosition.x, 2) +
                Math.pow(gameState.targetPosition.y, 2) +
                Math.pow(gameState.targetPosition.z, 2)
            );
        }

        // ===== 陀螺儀事件 =====
        function handleDeviceOrientation(event) {
            gameState.deviceOrientation.alpha = event.alpha || 0;
            gameState.deviceOrientation.beta = event.beta || 0;
            gameState.deviceOrientation.gamma = event.gamma || 0;

            if (gameState.camera) {
                updateCameraFromOrientation();
            }

            updateStatusDisplay();
        }

        function handleDeviceMotion(event) {
            // 可選：使用加速度計數據
        }

        function updateCameraFromOrientation() {
            const alpha = THREE.MathUtils.degToRad(gameState.deviceOrientation.alpha);
            const beta = THREE.MathUtils.degToRad(gameState.deviceOrientation.beta);
            const gamma = THREE.MathUtils.degToRad(gameState.deviceOrientation.gamma);

            // 使用歐拉角更新相機方向
            gameState.camera.rotation.order = 'YXZ';
            gameState.camera.rotation.y = -alpha;
            gameState.camera.rotation.x = beta;
            gameState.camera.rotation.z = gamma;

            // 更新視野方向
            gameState.cameraDirection = gameState.deviceOrientation.alpha;

            // 檢查目標是否在視野中
            checkTargetVisibility();
        }

        function checkTargetVisibility() {
            const cameraWorldPos = new THREE.Vector3();
            gameState.camera.getWorldPosition(cameraWorldPos);

            const directionToTarget = new THREE.Vector3(
                gameState.targetPosition.x - cameraWorldPos.x,
                gameState.targetPosition.y - cameraWorldPos.y,
                gameState.targetPosition.z - cameraWorldPos.z
            );

            directionToTarget.normalize();

            const cameraDirection = new THREE.Vector3(0, 0, -1);
            cameraDirection.applyQuaternion(gameState.camera.quaternion);

            const angle = Math.acos(Math.min(1, Math.max(-1, cameraDirection.dot(directionToTarget))));
            const angleInDegrees = THREE.MathUtils.radToDeg(angle);

            // 視野角度約為60度
            gameState.isTargetVisible = angleInDegrees < 30;

            // 更新指引箭頭
            updateDirectionArrow();
        }

        function updateDirectionArrow() {
            const uiLayer = document.getElementById('uiLayer');
            
            // 移除舊箭頭
            const oldArrow = uiLayer.querySelector('.direction-arrow');
            if (oldArrow) oldArrow.remove();

            if (gameState.isTargetVisible) {
                // 目標可見，不顯示箭頭
                return;
            }

            // 計算箭頭方向
            const cameraWorldPos = new THREE.Vector3();
            gameState.camera.getWorldPosition(cameraWorldPos);

            const directionToTarget = new THREE.Vector3(
                gameState.targetPosition.x,
                0, // 忽略Y軸，固定在水平高度
                gameState.targetPosition.z
            );

            // 計算相對於相機前方的角度
            const cameraForward = new THREE.Vector3(
                Math.sin(THREE.MathUtils.degToRad(gameState.cameraDirection)),
                0,
                Math.cos(THREE.MathUtils.degToRad(gameState.cameraDirection))
            );

            let angleToTarget = Math.atan2(directionToTarget.x, directionToTarget.z) - 
                               Math.atan2(cameraForward.x, cameraForward.z);

            // 正規化角度到 -π 到 π
            while (angleToTarget > Math.PI) angleToTarget -= 2 * Math.PI;
            while (angleToTarget < -Math.PI) angleToTarget += 2 * Math.PI;

            const angleInDegrees = THREE.MathUtils.radToDeg(angleToTarget);

            // 創建箭頭
            const arrow = document.createElement('div');
            arrow.className = 'direction-arrow';
            
            // 判斷箭頭位置（屏幕邊緣）
            const arrowSize = 50;
            let x, y;

            if (Math.abs(angleInDegrees) < 45) {
                // 目標在前方
                x = window.innerWidth / 2 - arrowSize / 2;
                y = arrowSize / 2;
                arrow.textContent = '⬇️';
            } else if (Math.abs(angleInDegrees) < 135 && angleInDegrees > 0) {
                // 目標在右方
                x = window.innerWidth - arrowSize;
                y = window.innerHeight / 2 - arrowSize / 2;
                arrow.textContent = '⬅️';
            } else if (Math.abs(angleInDegrees) < 135 && angleInDegrees < 0) {
                // 目標在左方
                x = arrowSize / 2;
                y = window.innerHeight / 2 - arrowSize / 2;
                arrow.textContent = '➡️';
            } else {
                // 目標在後方
                x = window.innerWidth / 2 - arrowSize / 2;
                y = window.innerHeight - arrowSize;
                arrow.textContent = '⬆️';
            }

            arrow.style.left = x + 'px';
            arrow.style.top = y + 'px';
            uiLayer.appendChild(arrow);
        }

        // ===== Three.js 場景初始化 =====
        function initThreeJs() {
            const canvas = document.getElementById('glCanvas');
            const width = window.innerWidth;
            const height = window.innerHeight;

            // 場景
            gameState.scene = new THREE.Scene();
            gameState.scene.background = null;

            // 相機
            gameState.camera = new THREE.PerspectiveCamera(60, width / height, 0.1, 1000);
            gameState.camera.position.set(0, 0, 0);

            // 渲染器
            gameState.renderer = new THREE.WebGLRenderer({ 
                canvas: canvas,
                alpha: true,
                antialias: true
            });
            gameState.renderer.setSize(width, height);
            gameState.renderer.setPixelRatio(window.devicePixelRatio);

            // 光源
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            gameState.scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 10, 5);
            gameState.scene.add(directionalLight);

            // 生成隨機目標角色
            spawnTarget();

            // 動畫循環
            animate();
        }

        function spawnTarget() {
            // 移除舊角色
            if (gameState.targetMesh) {
                gameState.scene.remove(gameState.targetMesh);
            }

            // 隨機生成位置（方位角 0-360度，距離 3-10米）
            const randomAngle = Math.random() * Math.PI * 2;
            const randomDistance = 3 + Math.random() * 7;

            gameState.targetPosition = {
                x: Math.sin(randomAngle) * randomDistance,
                y: 0, // 固定在地面
                z: Math.cos(randomAngle) * randomDistance
            };

            // 創建3D角色（簡化版本：立方體組成）
            gameState.targetMesh = createCharacterMesh();
            gameState.targetMesh.position.set(
                gameState.targetPosition.x,
                gameState.targetPosition.y,
                gameState.targetPosition.z
            );
            gameState.scene.add(gameState.targetMesh);

            // 添加發光效果
            const light = new THREE.PointLight(0xff6600, 1, 20);
            light.position.copy(gameState.targetMesh.position);
            light.position.y += 2;
            gameState.scene.add(light);
        }

        function createCharacterMesh() {
            const group = new THREE.Group();

            // 身體
            const bodyGeometry = new THREE.BoxGeometry(0.4, 1, 0.4);
            const bodyMaterial = new THREE.MeshPhongMaterial({ color: 0xff6600 });
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            body.position.y = 0.5;
            body.castShadow = true;
            group.add(body);

            // 頭部
            const headGeometry = new THREE.SphereGeometry(0.3, 32, 32);
            const headMaterial = new THREE.MeshPhongMaterial({ color: 0xffaa66 });
            const head = new THREE.Mesh(headGeometry, headMaterial);
            head.position.y = 1.3;
            head.castShadow = true;
            group.add(head);

            // 左臂
            const armGeometry = new THREE.BoxGeometry(0.15, 0.8, 0.15);
            const armMaterial = new THREE.MeshPhongMaterial({ color: 0xffaa66 });
            const leftArm = new THREE.Mesh(armGeometry, armMaterial);
            leftArm.position.set(-0.35, 0.8, 0);
            leftArm.castShadow = true;
            group.add(leftArm);

            // 右臂
            const rightArm = new THREE.Mesh(armGeometry, armMaterial);
            rightArm.position.set(0.35, 0.8, 0);
            rightArm.castShadow = true;
            group.add(rightArm);

            // 左腿
            const legGeometry = new THREE.BoxGeometry(0.15, 0.8, 0.15);
            const legMaterial = new THREE.MeshPhongMaterial({ color: 0x8B4513 });
            const leftLeg = new THREE.Mesh(legGeometry, legMaterial);
            leftLeg.position.set(-0.15, 0, 0);
            leftLeg.castShadow = true;
            group.add(leftLeg);

            // 右腿
            const rightLeg = new THREE.Mesh(legGeometry, legMaterial);
            rightLeg.position.set(0.15, 0, 0);
            rightLeg.castShadow = true;
            group.add(rightLeg);

            return group;
        }

        function animate() {
            requestAnimationFrame(animate);

            if (gameState.isRunning && gameState.targetMesh) {
                // 讓角色旋轉
                gameState.targetMesh.rotation.y += 0.01;

                // 輕微浮動動畫
                gameState.targetMesh.position.y = Math.sin(Date.now() * 0.002) * 0.3;
            }

            gameState.renderer.render(gameState.scene, gameState.camera);
        }

        // ===== 相機初始化 =====
        async function initCamera() {
            const cameraCanvas = document.getElementById('cameraCanvas');
            const ctx = cameraCanvas.getContext('2d');
            cameraCanvas.width = window.innerWidth;
            cameraCanvas.height = window.innerHeight;

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }
                });

                const video = document.getElementById('cameraFeed');
                video.srcObject = stream;
                video.play();

                // 繪製相機背景
                function drawCameraFrame() {
                    if (video.readyState === video.HAVE_ENOUGH_DATA) {
                        ctx.drawImage(video, 0, 0, cameraCanvas.width, cameraCanvas.height);
                    }
                    requestAnimationFrame(drawCameraFrame);
                }
                drawCameraFrame();
            } catch (error) {
                console.error('相機初始化失敗:', error);
                alert('無法訪問相機');
            }
        }

        // ===== 權限請求 =====
        function requestPermissions() {
            // 請求設備方向許可
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permission => {
                        if (permission === 'granted') {
                            window.addEventListener('deviceorientation', handleDeviceOrientation);
                            gameState.gyroscopeActive = true;
                            startGame();
                        }
                    })
                    .catch(console.error);
            } else {
                // 不需要權限的設備（Android等）
                window.addEventListener('deviceorientation', handleDeviceOrientation);
                gameState.gyroscopeActive = true;
                startGame();
            }

            initCamera();
        }

        // ===== 遊戲控制 =====
        function startGame() {
            gameState.isRunning = true;
            document.getElementById('permissionRequest').classList.add('hidden');
            document.getElementById('startBtn').textContent = '遊戲進行中...';
            document.getElementById('startBtn').disabled = true;
        }

        function resetTarget() {
            spawnTarget();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.error(`全屏請求失敗: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // ===== 窗口事件 =====
        window.addEventListener('resize', () => {
            if (gameState.renderer) {
                gameState.renderer.setSize(window.innerWidth, window.innerHeight);
                gameState.camera.aspect = window.innerWidth / window.innerHeight;
                gameState.camera.updateProjectionMatrix();
            }
        });

        // ===== 初始化 =====
        document.getElementById('startBtn').addEventListener('click', () => {
            document.getElementById('permissionRequest').classList.remove('hidden');
        });

        document.getElementById('permissionBtn').addEventListener('click', requestPermissions);
        document.getElementById('resetBtn').addEventListener('click', resetTarget);
        document.getElementById('fullscreenBtn').addEventListener('click', toggleFullscreen);

        // 初始化Three.js
        initThreeJs();
    </script>
</body>
</html>
