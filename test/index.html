<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>AR.LAB // Spatial Playground</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0b;
    --bg-2: #111113;
    --panel: rgba(20, 20, 22, 0.7);
    --line: rgba(255, 255, 255, 0.08);
    --line-strong: rgba(255, 255, 255, 0.18);
    --text: #e8e6e1;
    --text-dim: #8a8680;
    --text-faint: #4a4641;
    --amber: #ff8c42;
    --amber-dim: #c46730;
    --mint: #5eead4;
    --mint-dim: #3fa894;
    --danger: #f87171;
    --mono: 'Space Mono', ui-monospace, monospace;
    --sans: 'DM Sans', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; overscroll-behavior: none; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    user-select: none;
    -webkit-user-select: none;
  }
  /* Grid texture */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255, 140, 66, 0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 140, 66, 0.035) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
    mask-image: radial-gradient(ellipse at center, black 20%, transparent 80%);
  }
  /* Noise */
  body::after {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 1;
    opacity: 0.035;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }

  /* ---------- MAIN MENU ---------- */
  #app {
    position: relative;
    z-index: 2;
    height: 100vh;
    height: 100dvh;
    overflow-y: auto;
    padding: max(20px, env(safe-area-inset-top)) 20px max(20px, env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 16px 4px 28px;
    border-bottom: 1px dashed var(--line);
    margin-bottom: 24px;
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
  }
  .logo {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.05em;
  }
  .logo-mark {
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .logo-dot {
    width: 8px; height: 8px;
    background: var(--amber);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--amber);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }
  .logo-text { color: var(--text); }
  .logo-sub { color: var(--text-faint); font-weight: 400; }
  .status {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    text-align: right;
    line-height: 1.5;
  }
  .status-row { display: flex; gap: 6px; justify-content: flex-end; align-items: center; }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-faint);
  }
  .status-dot.ok { background: var(--mint); box-shadow: 0 0 8px var(--mint-dim); }
  .status-dot.warn { background: var(--amber); box-shadow: 0 0 8px var(--amber-dim); }

  .hero {
    margin-top: 12px;
  }
  .hero-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--amber);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .hero h1 {
    font-family: var(--mono);
    font-weight: 700;
    font-size: clamp(32px, 9vw, 48px);
    line-height: 1.15;
    letter-spacing: -0.02em;
    margin-bottom: 14px;
    white-space: nowrap;
  }
  .hero h1 .accent { color: var(--amber); }
  .hero h1 .slash { color: var(--text-faint); margin: 0 0.1em; }
  .hero p {
    font-size: 14px;
    line-height: 1.6;
    color: var(--text-dim);
    max-width: 36ch;
  }

  main { flex: 1; }
  .section-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin: 8px 4px 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--line);
  }
  .section-header h2 {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .section-header .count {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-faint);
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }
  .card {
    position: relative;
    aspect-ratio: 1 / 1.15;
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 14px;
    cursor: pointer;
    overflow: hidden;
    transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 8px; right: 8px;
    width: 6px; height: 6px;
    border-top: 1px solid var(--text-faint);
    border-right: 1px solid var(--text-faint);
  }
  .card::after {
    content: '';
    position: absolute;
    bottom: 8px; left: 8px;
    width: 6px; height: 6px;
    border-bottom: 1px solid var(--text-faint);
    border-left: 1px solid var(--text-faint);
  }
  .card:active {
    transform: scale(0.98);
    border-color: var(--amber);
  }
  .card-num {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 0.1em;
  }
  .card-visual {
    height: 58%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 8px 0;
  }
  .card-visual svg {
    width: 70%;
    height: 70%;
    stroke: var(--text-dim);
    stroke-width: 1.2;
    fill: none;
    transition: stroke 0.2s;
  }
  .card:active .card-visual svg { stroke: var(--amber); }
  .card-title {
    font-family: var(--sans);
    font-weight: 700;
    font-size: 14px;
    line-height: 1.2;
    margin-bottom: 2px;
  }
  .card-desc {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-faint);
    letter-spacing: 0.05em;
    line-height: 1.4;
  }
  .card.featured {
    grid-column: span 2;
    aspect-ratio: 2.1 / 1;
    background: linear-gradient(135deg, #1a1a1d 0%, #0a0a0b 100%);
    border-color: rgba(255, 140, 66, 0.25);
  }
  .card.featured::before, .card.featured::after {
    border-color: var(--amber-dim);
  }
  .card.featured .card-inner {
    display: flex;
    align-items: center;
    gap: 16px;
    height: 100%;
  }
  .card.featured .card-visual {
    width: 42%;
    height: 100%;
    margin: 0;
    flex-shrink: 0;
  }
  .card.featured .card-visual svg { stroke: var(--amber); width: 100%; height: 100%;}
  .card.featured .card-body { flex: 1; }
  .card.featured .card-title { font-size: 18px; margin-bottom: 8px; }
  .card.featured .card-desc { color: var(--text-dim); line-height: 1.5; }

  /* Tips box */
  .info-panel {
    background: var(--bg-2);
    border: 1px solid var(--line);
    padding: 16px;
    margin-bottom: 24px;
    position: relative;
  }
  .info-panel::before {
    content: 'INFO';
    position: absolute;
    top: -7px; left: 12px;
    background: var(--bg);
    padding: 0 8px;
    font-family: var(--mono);
    font-size: 9px;
    color: var(--mint);
    letter-spacing: 0.15em;
  }
  .info-panel h3 {
    font-family: var(--mono);
    font-size: 12px;
    margin-bottom: 10px;
    color: var(--text);
  }
  .info-panel ul {
    list-style: none;
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.7;
  }
  .info-panel li {
    padding-left: 18px;
    position: relative;
  }
  .info-panel li::before {
    content: '→';
    position: absolute;
    left: 0;
    color: var(--amber);
    font-family: var(--mono);
  }

  footer {
    padding: 16px 4px 8px;
    border-top: 1px dashed var(--line);
    margin-top: auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-faint);
    letter-spacing: 0.08em;
  }

  /* ---------- AR OVERLAY ---------- */
  #ar-overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    pointer-events: none;
    font-family: var(--mono);
    color: var(--text);
    display: none;
  }
  #ar-overlay.active { display: block; }
  /* All direct children block pointer events so they don't bleed to the canvas */
  #ar-overlay > * { pointer-events: auto; }
  /* The AR instruction and coords are display-only — pass through */
  #ar-instruction, #ar-coords { pointer-events: none; }

  .ar-hud-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: calc(env(safe-area-inset-top) + 12px) 16px 12px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
    pointer-events: auto;  /* block pass-through */
  }
  .ar-btn {
    pointer-events: auto;
    background: rgba(10, 10, 11, 0.75);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--line-strong);
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    padding: 10px 14px;
    cursor: pointer;
    letter-spacing: 0.05em;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border-radius: 2px;
    transition: background 0.15s;
  }
  .ar-btn:active { background: rgba(255, 140, 66, 0.2); border-color: var(--amber); }
  .ar-btn.icon { padding: 10px; width: 40px; height: 40px; justify-content: center; }
  .ar-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.5; }

  .ar-hud-info {
    pointer-events: none;
    background: rgba(10, 10, 11, 0.75);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--line-strong);
    padding: 8px 12px;
    font-size: 10px;
    color: var(--text-dim);
    border-radius: 2px;
    line-height: 1.5;
    max-width: 160px;
    text-align: right;
  }
  .ar-hud-info .exp-name {
    color: var(--amber);
    font-weight: 700;
    letter-spacing: 0.1em;
    font-size: 11px;
  }
  .ar-hud-info .counter {
    color: var(--text);
    font-size: 14px;
    font-weight: 700;
  }

  .ar-instruction {
    position: absolute;
    bottom: 28%;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10, 10, 11, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--line-strong);
    padding: 20px 24px;
    border-radius: 2px;
    text-align: center;
    max-width: 80%;
    pointer-events: none;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateX(-50%) translateY(10px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
  .ar-instruction.hidden { display: none; }
  .ar-instruction-icon {
    width: 48px;
    height: 48px;
    margin: 0 auto 12px;
    border: 1px solid var(--amber);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: scan 2s ease-in-out infinite;
  }
  @keyframes scan {
    0%, 100% { border-color: var(--amber); transform: scale(1); }
    50% { border-color: var(--mint); transform: scale(1.1); }
  }
  .ar-instruction-icon svg { width: 24px; height: 24px; stroke: var(--amber); fill: none; stroke-width: 1.5;}
  .ar-instruction h3 {
    font-size: 13px;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
    color: var(--amber);
  }
  .ar-instruction p {
    font-family: var(--sans);
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
  }

  .ar-hud-bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 16px 16px calc(env(safe-area-inset-bottom) + 20px);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    pointer-events: none;
    background: linear-gradient(to top, rgba(0,0,0,0.5), transparent);
  }
  .ar-toolbar {
    pointer-events: auto;
    display: flex;
    gap: 8px;
    background: rgba(10, 10, 11, 0.8);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--line-strong);
    padding: 6px;
    border-radius: 4px;
  }
  .ar-tool {
    pointer-events: auto;
    width: 44px; height: 44px;
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    border-radius: 2px;
    transition: all 0.15s;
  }
  .ar-tool.active { background: var(--amber); color: #000; }
  .ar-tool:active { background: rgba(255, 140, 66, 0.3); }
  .ar-tool svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.5; }
  .ar-tool.color-swatch { border: 2px solid var(--line-strong); }
  .ar-tool.color-swatch.active { border-color: var(--text); }

  .ar-primary-btn {
    pointer-events: auto;
    background: var(--amber);
    color: #000;
    border: none;
    padding: 14px 28px;
    font-family: var(--mono);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.15em;
    cursor: pointer;
    border-radius: 2px;
    min-width: 140px;
  }
  .ar-primary-btn:active { background: var(--mint); }

  /* Square capture button (anatomy / starmap) */
  .ar-capture-square {
    pointer-events: auto;
    width: 64px; height: 64px;
    background: rgba(255,255,255,0.12);
    border: 3px solid rgba(255,255,255,0.8);
    border-radius: 6px;
    cursor: pointer;
    position: relative;
    transition: background 0.15s, border-color 0.15s;
  }
  .ar-capture-square::after {
    content: '';
    position: absolute;
    inset: 5px;
    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 3px;
  }
  .ar-capture-square:active { background: rgba(255,255,255,0.3); border-color: #fff; }

  .ar-coords {
    position: absolute;
    bottom: calc(env(safe-area-inset-bottom) + 16px);
    left: 14px;
    font-size: 9px;
    color: rgba(255,255,255,0.45);
    line-height: 1.6;
    letter-spacing: 0.05em;
    pointer-events: none;
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
  }

  /* Hide PC hint on mobile / touch devices */
  @media (hover: none) and (pointer: coarse) {
    #pc-controls-hint { display: none !important; }
  }

  /* Screenshot flash */
  .flash {
    position: fixed;
    inset: 0;
    background: white;
    z-index: 999;
    opacity: 0;
    pointer-events: none;
  }
  .flash.active {
    animation: flashAnim 0.4s ease;
  }
  @keyframes flashAnim {
    0% { opacity: 0; }
    20% { opacity: 0.9; }
    100% { opacity: 0; }
  }

  /* Modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 500;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-backdrop.active { display: flex; }
  .modal {
    background: var(--bg-2);
    border: 1px solid var(--line-strong);
    padding: 24px;
    max-width: 440px;
    width: 100%;
    position: relative;
  }
  .modal::before {
    content: '';
    position: absolute; top: 8px; right: 8px;
    width: 8px; height: 8px;
    border-top: 1px solid var(--amber);
    border-right: 1px solid var(--amber);
  }
  .modal::after {
    content: '';
    position: absolute; bottom: 8px; left: 8px;
    width: 8px; height: 8px;
    border-bottom: 1px solid var(--amber);
    border-left: 1px solid var(--amber);
  }
  .modal-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--amber);
    margin-bottom: 8px;
  }
  .modal h3 {
    font-family: var(--mono);
    font-size: 18px;
    margin-bottom: 16px;
    line-height: 1.3;
  }
  .modal p {
    font-size: 14px;
    color: var(--text-dim);
    line-height: 1.6;
    margin-bottom: 12px;
  }
  .modal .instructions-list {
    list-style: none;
    padding: 0;
    margin: 16px 0;
  }
  .modal .instructions-list li {
    font-size: 13px;
    color: var(--text-dim);
    padding: 8px 0 8px 24px;
    position: relative;
    border-bottom: 1px dashed var(--line);
  }
  .modal .instructions-list li::before {
    content: attr(data-num);
    position: absolute; left: 0;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--amber);
    top: 10px;
  }
  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 16px;
  }
  .modal-btn {
    flex: 1;
    padding: 14px 16px;
    border: 1px solid var(--line-strong);
    background: transparent;
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    cursor: pointer;
    border-radius: 2px;
  }
  .modal-btn.primary {
    background: var(--amber);
    color: #000;
    border-color: var(--amber);
    font-weight: 700;
  }
  .modal-btn:active { opacity: 0.7; }

  /* Loading */
  .loader {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 300;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  .loader.active { display: flex; }
  .loader-spin {
    width: 40px; height: 40px;
    border: 1px solid var(--line);
    border-top-color: var(--amber);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader-text {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
  }

  /* Toast */
  .toast {
    position: fixed;
    top: calc(env(safe-area-inset-top) + 70px);
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10, 10, 11, 0.9);
    backdrop-filter: blur(12px);
    border: 1px solid var(--mint);
    color: var(--mint);
    padding: 10px 18px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    z-index: 200;
    border-radius: 2px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .toast.show { opacity: 1; }

  /* Settings */
  .slider-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(10, 10, 11, 0.8);
    backdrop-filter: blur(12px);
    border: 1px solid var(--line-strong);
    padding: 10px 14px;
    border-radius: 2px;
    pointer-events: auto;
  }
  .slider-row label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    min-width: 40px;
  }
  .slider-row input[type="range"] {
    flex: 1;
    appearance: none;
    height: 2px;
    background: var(--line-strong);
    outline: none;
  }
  .slider-row input[type="range"]::-webkit-slider-thumb {
    appearance: none;
    width: 14px; height: 14px;
    background: var(--amber);
    border-radius: 50%;
    cursor: pointer;
  }
  .slider-row input[type="range"]::-moz-range-thumb {
    width: 14px; height: 14px;
    background: var(--amber);
    border-radius: 50%;
    border: none;
    cursor: pointer;
  }
