  <style>
    :root {
      --bg: #e4e6ea;
      --top: #111214;
      --panel: #ffffff;
      --panel-2: #f6f7f9;
      --panel-3: #eef1f6;
      --line: #dfe3ea;
      --line-strong: #c9ced8;
      --text: #15171d;
      --muted: #6f7682;
      --brand: #3767ff;
      --brand-soft: #edf2ff;
      --danger: #ff4d4f;
      --radius: 18px;
      --shadow: 0 24px 70px rgba(15, 19, 32, 0.18);
      --top-h: 58px;
      --rail-w: 66px;
      --panel-w: 342px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; color: var(--text); background: var(--bg); user-select: none; -webkit-user-select: none; }
    body { overscroll-behavior: none; }
    button, input, textarea { font: inherit; }
    input, textarea, .text-editor { user-select: text; -webkit-user-select: text; }
    button { border: 0; background: transparent; cursor: pointer; color: inherit; }
    button:focus-visible, input:focus-visible, textarea:focus-visible { outline: 3px solid rgba(55, 103, 255, .26); outline-offset: 2px; }

    .topbar {
      height: var(--top-h);
      background: linear-gradient(180deg, #15161a 0%, #0f1012 100%);
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 14px;
      user-select: none;
      position: relative;
      z-index: 30;
      min-width: 0;
      box-shadow: 0 1px 0 rgba(255,255,255,.05) inset;
    }
    .logo {
      width: 28px;
      height: 28px;
      border-radius: 9px;
      background: url("data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20viewBox%3D%270%200%2064%2064%27%3E%0A%3Cdefs%3E%0A%20%20%3ClinearGradient%20id%3D%27bg%27%20x1%3D%278%27%20y1%3D%276%27%20x2%3D%2756%27%20y2%3D%2758%27%20gradientUnits%3D%27userSpaceOnUse%27%3E%0A%20%20%20%20%3Cstop%20offset%3D%270%27%20stop-color%3D%27%235B8DFF%27%2F%3E%0A%20%20%20%20%3Cstop%20offset%3D%271%27%20stop-color%3D%27%233767FF%27%2F%3E%0A%20%20%3C%2FlinearGradient%3E%0A%20%20%3ClinearGradient%20id%3D%27dot%27%20x1%3D%2714%27%20y1%3D%2712%27%20x2%3D%2728%27%20y2%3D%2726%27%20gradientUnits%3D%27userSpaceOnUse%27%3E%0A%20%20%20%20%3Cstop%20offset%3D%270%27%20stop-color%3D%27%23FFB347%27%2F%3E%0A%20%20%20%20%3Cstop%20offset%3D%271%27%20stop-color%3D%27%23FF5A36%27%2F%3E%0A%20%20%3C%2FlinearGradient%3E%0A%3C%2Fdefs%3E%0A%3Crect%20width%3D%2764%27%20height%3D%2764%27%20rx%3D%2718%27%20fill%3D%27url%28%23bg%29%27%2F%3E%0A%3Ccircle%20cx%3D%2718%27%20cy%3D%2718%27%20r%3D%278%27%20fill%3D%27url%28%23dot%29%27%20opacity%3D%27.98%27%2F%3E%0A%3Cpath%20d%3D%27M43.846%2015.918a4%204%200%200%201%205.657%200l.58.58a4%204%200%200%201%200%205.657L29.379%2042.858l-9.026%202.188%202.188-9.026z%27%20fill%3D%27%23fff%27%2F%3E%0A%3Cpath%20d%3D%27M40.829%2018.935%2047.067%2025.173%27%20stroke%3D%27%23D8E5FF%27%20stroke-width%3D%273.6%27%20stroke-linecap%3D%27round%27%2F%3E%0A%3Cpath%20d%3D%27m20.353%2045.046%203.928-8.04%204.112%204.112z%27%20fill%3D%27%23CFE0FF%27%2F%3E%0A%3C%2Fsvg%3E") center / cover no-repeat;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.16), 0 8px 20px rgba(61,99,255,.26);
      flex: 0 0 auto;
    }
    .brand-title { display: none; }
    .title-sizer { position: fixed; left: -9999px; top: -9999px; visibility: hidden; white-space: pre; font-weight: 760; font: inherit; }
    .doc-name { display: flex; align-items: center; gap: 8px; min-width: 0; flex: 1 1 auto; font-weight: 760; color: rgba(255,255,255,.92); }
    .doc-name input { width: auto; min-width: 72px; max-width: min(520px, 58vw); border: 0; border-radius: 12px; padding: 8px 10px 8px 10px; color: #fff; background: transparent; font-weight: 760; transition: width .12s ease; text-overflow: ellipsis; }
    .doc-name input:hover, .doc-name input:focus { background: rgba(255,255,255,.08); }
    .top-actions { display: flex; align-items: center; gap: 8px; min-width: 0; flex: 0 0 auto; }
    .icon-btn, .pill-btn, .tool-btn, .chip, .swatch, .brush-card, .preset-card, .shape-card, .menu-item { -webkit-tap-highlight-color: transparent; }
    .icon-btn { width: 38px; height: 38px; display: inline-grid; place-items: center; border-radius: 13px; color: rgba(255,255,255,.88); }
    .icon-btn:hover { background: rgba(255,255,255,.11); }
    .icon-btn:disabled, .chip:disabled, .pill-btn:disabled { opacity: .38; cursor: not-allowed; pointer-events: none; transform: none !important; filter: none !important; }
    .pill-btn { height: 38px; padding: 0 16px; border-radius: 999px; font-weight: 850; background: rgba(255,255,255,.12); color: #fff; display: inline-flex; align-items: center; gap: 8px; white-space: nowrap; }
    .pill-btn.primary { background: var(--brand); }
    #downloadBtn { background: var(--brand); color: #fff; box-shadow: 0 8px 18px rgba(55, 103, 255, .32); }
    .pill-btn:hover { filter: brightness(1.08); }

    .app { height: calc(100dvh - var(--top-h)); display: grid; grid-template-columns: var(--rail-w) var(--panel-w) 1fr; grid-template-rows: 1fr; min-height: 0; transition: grid-template-columns .32s cubic-bezier(.22,.9,.22,1); }
    .app.panel-collapsed { grid-template-columns: var(--rail-w) 0 1fr; }

    .rail { background: rgba(255,255,255,.96); border-right: 1px solid var(--line); display: flex; flex-direction: column; align-items: center; padding: 12px 8px; gap: 10px; z-index: 16; box-shadow: 1px 0 0 rgba(255,255,255,.75) inset; }
    .tool-btn { width: 48px; min-height: 52px; border-radius: 16px; display: grid; grid-template-rows: 24px 1fr; align-items: center; justify-items: center; gap: 3px; color: #272b33; transition: background .16s ease, color .16s ease, transform .16s ease; font-size: 20px; }
    .tool-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
    .tool-btn small { font-size: 12px; font-weight: 820; color: #5c6370; letter-spacing: -.01em; }
    .tool-btn:hover { background: var(--panel-2); transform: translateY(-1px); }
    .tool-btn.active { background: var(--brand-soft); color: var(--brand); box-shadow: inset 0 0 0 2px rgba(55,103,255,.18); }
    .tool-btn.active small { color: var(--brand); }
    .rail-sep { width: 34px; height: 1px; background: var(--line); margin: 2px 0; }

    .panel { background: var(--panel); border-right: 1px solid var(--line); min-width: 0; display: flex; flex-direction: column; z-index: 15; overflow: hidden; transition: opacity .22s ease, transform .32s cubic-bezier(.22,.9,.22,1); will-change: transform, opacity; }
    .panel.closed { opacity: 0; pointer-events: none; transform: translateX(-18px); }
    .panel-head { height: 60px; min-height: 60px; flex: 0 0 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 19px; border-bottom: 1px solid var(--line); background: rgba(255,255,255,.92); backdrop-filter: blur(16px); }
    .panel-title { font-weight: 950; font-size: 20px; letter-spacing: -.02em; }
    .panel-close { width: 36px; height: 36px; border-radius: 12px; display: grid; place-items: center; color: #343942; }
    .panel-close:hover { background: var(--panel-2); }
    .panel-body { padding: 19px; overflow: auto; overscroll-behavior: contain; scrollbar-width: none; min-width: 0; }
    .panel-body::-webkit-scrollbar { display: none; }
    .section { display: none; animation: fade .16s ease; }
    .section.active { display: block; }
    @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .control-block { margin: 0 0 23px; min-width: 0; }
    .label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 11px; gap: 10px; min-width: 0; }
    .label-row label, .label-row span { font-size: 15px; color: var(--muted); font-weight: 820; min-width: 0; overflow-wrap: anywhere; }
    .number-input { width: 86px; height: 40px; border: 2px solid #b9bec8; border-radius: 13px; text-align: center; font-weight: 850; background: #fff; color: #20242b; }
    .number-input::-webkit-outer-spin-button, .number-input::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button, input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .number-input, input[type="number"] { appearance: textfield; -moz-appearance: textfield; }
    input[type="range"] { width: 100%; accent-color: var(--brand); }
    .slider-control { display: grid; grid-template-columns: minmax(0, 1fr) 86px; gap: 18px; align-items: center; }
    .slider-control input[type="range"] { height: 28px; appearance: none; background: transparent; }
    .slider-control input[type="range"]::-webkit-slider-runnable-track { height: 4px; border-radius: 999px; background: linear-gradient(90deg, #20242b, #dfe3ea); }
    .slider-control input[type="range"]::-webkit-slider-thumb { appearance: none; width: 24px; height: 24px; margin-top: -10px; border-radius: 50%; background: #fff; border: 3px solid #555b66; box-shadow: 0 3px 10px rgba(0,0,0,.18); }
    .slider-control input[type="range"]::-moz-range-track { height: 4px; border-radius: 999px; background: linear-gradient(90deg, #20242b, #dfe3ea); }
    .slider-control input[type="range"]::-moz-range-thumb { width: 20px; height: 20px; border-radius: 50%; background: #fff; border: 3px solid #555b66; box-shadow: 0 3px 10px rgba(0,0,0,.18); }
    .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; min-width: 0; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 11px; min-width: 0; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 11px; min-width: 0; }

    .ratio-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 11px; min-width: 0; }
    .ratio-card { min-height: 94px; gap: 7px; padding: 10px 7px; }
    .ratio-preview { width: 46px; height: 34px; display: grid; place-items: center; }
    .ratio-box { display: block; border: 2px solid currentColor; border-radius: 5px; background: rgba(55,103,255,.08); box-shadow: inset 0 0 0 1px rgba(255,255,255,.72); }
    .ratio-card strong { font-size: 15px; line-height: 1; letter-spacing: -.01em; }
    .swatches { display: grid; grid-template-columns: repeat(auto-fit, minmax(40px, 1fr)); gap: 9px; max-height: none; overflow: visible; width: 100%; min-width: 0; }
    .swatch { width: 100%; aspect-ratio: 1 / 1; min-width: 0; max-width: 48px; justify-self: stretch; border-radius: 12px; border: 1px solid rgba(20,22,26,.16); box-shadow: inset 0 0 0 2px rgba(255,255,255,.44), 0 1px 2px rgba(0,0,0,.08); position: relative; }
    .swatch.none { background: #fff; }
    .swatch.none::after { content: ""; position: absolute; left: 12%; right: 12%; top: 50%; height: 4px; border-radius: 99px; background: #e43333; transform: translateY(-50%) rotate(45deg); }
    .swatch.active { outline: 3px solid #16191f; outline-offset: 2px; }
    .swatch.more { display: grid; place-items: center; background: #fff; color: #1f242d; border: 2px solid #bcc3cf; box-shadow: none; font-size: 24px; font-weight: 500; }
    .swatch.more svg { width: 21px; height: 21px; stroke: currentColor; fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
    .swatch.hidden-swatch { display: none; }
    .chip { min-height: 39px; min-width: 0; padding: 9px 13px; border-radius: 13px; background: var(--panel-2); border: 1px solid var(--line); font-weight: 850; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: .16s ease; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .chip:hover { background: #fff; border-color: var(--line-strong); transform: translateY(-1px); }
    .chip.active { background: var(--brand-soft); color: var(--brand); border-color: rgba(55,103,255,.28); }
    .chip.full { width: 100%; }
    .chip.danger { color: var(--danger); background: #fff3f3; border-color: #ffd7d7; }
    .brush-card, .preset-card, .shape-card { min-height: 82px; min-width: 0; border-radius: 16px; border: 1px solid var(--line); background: linear-gradient(180deg, #f9fafb 0%, #eef1f6 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; padding: 9px; font-weight: 850; color: #2d3138; position: relative; overflow: hidden; transition: .16s ease; }
    .brush-card svg, .shape-card svg { width: 100%; height: 38px; }
    .shape-card svg { height: 34px; stroke: currentColor; fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
    .brush-card small, .preset-card small, .shape-card small { color: var(--muted); font-size: 13px; font-weight: 820; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .brush-card:hover, .preset-card:hover, .shape-card:hover { transform: translateY(-1px); border-color: var(--line-strong); }
    .brush-card.active, .preset-card.active, .shape-card.active { background: #fff; border-color: #171a20; box-shadow: inset 0 0 0 1px #171a20, 0 8px 20px rgba(13,18,30,.08); }
    .field { display: grid; gap: 8px; margin-bottom: 13px; min-width: 0; }
    .field:has(#canvasW), .field:has(#canvasH), #applyCanvasSize, #applySize, #resizeCanvasBtn, #applySizeBtn { display: none !important; }
    .font-family-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .font-family-row .chip { width: 100%; justify-content: center; }
    .field label { font-size: 14px; font-weight: 850; color: var(--muted); }
    .field input, .field textarea { width: 100%; border: 1px solid var(--line); background: #fff; border-radius: 13px; padding: 11px 12px; color: var(--text); }
    .field textarea { min-height: 76px; resize: vertical; }
    .hint { border-radius: 16px; background: #f3f6ff; color: #53608a; padding: 13px; line-height: 1.62; font-size: 14px; margin-top: 14px; overflow-wrap: anywhere; word-break: break-word; min-width: 0; }
    .segmented { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 7px; padding: 5px; background: var(--panel-3); border-radius: 16px; min-width: 0; }
    .segmented .chip { min-height: 36px; border-radius: 12px; border: 0; background: transparent; }
    .segmented .chip.active { background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,.08); }

    .workspace { min-width: 0; min-height: 0; display: grid; grid-template-rows: 50px 1fr; background: radial-gradient(circle at 50% -20%, rgba(255,255,255,.82), transparent 48%), var(--bg); }
    .contextbar { background: rgba(255,255,255,.82); border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 0 18px; backdrop-filter: blur(18px); z-index: 12; transition: padding .32s cubic-bezier(.22,.9,.22,1); }
    .context-left, .context-right { display: flex; align-items: center; gap: 10px; min-width: 0; overflow: hidden; }
    .toggle { height: 37px; display: inline-flex; align-items: center; gap: 8px; font-weight: 880; color: #333944; white-space: nowrap; border-radius: 999px; padding: 0 12px; background: rgba(255,255,255,.55); border: 1px solid transparent; }
    .toggle:hover { background: #fff; border-color: var(--line); }
    .toggle-box { width: 18px; height: 18px; border-radius: 99px; border: 2px solid #a4abb8; display: inline-grid; place-items: center; }
    .toggle.active .toggle-box { border-color: var(--brand); background: var(--brand); box-shadow: inset 0 0 0 4px #fff; }
    .zoom-wrap { position: relative; }
    .zoom-btn { min-width: 84px; height: 37px; border-radius: 999px; padding: 0 13px; background: rgba(255,255,255,.72); border: 1px solid transparent; font-weight: 930; display: inline-flex; align-items: center; justify-content: center; gap: 6px; line-height: 1; }
    .zoom-btn .zoom-value { display: inline-flex; align-items: center; height: 1em; line-height: 1; }
    .zoom-btn .zoom-caret { display: none !important; }
    .zoom-btn:hover, .zoom-btn.active { background: #fff; border-color: var(--line); }
    .menu { position: fixed; z-index: 80; min-width: 150px; padding: 7px; border-radius: 16px; background: rgba(255,255,255,.96); border: 1px solid rgba(204,210,220,.92); box-shadow: var(--shadow); display: none; backdrop-filter: blur(18px); }
    .menu.open { display: grid; gap: 4px; }
    .menu-item { height: 38px; padding: 0 12px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; font-weight: 850; }
    .menu-item:hover, .menu-item.active { background: var(--brand-soft); color: var(--brand); }

    .stage { overflow: hidden; position: relative; touch-action: none; cursor: default; }
    .stage::-webkit-scrollbar { display: none; }
    .stage-inner { position: absolute; inset: 0; padding: 0; min-width: 100%; min-height: 100%; }
    .canvas-wrap { transform-origin: 0 0; transition: transform .24s cubic-bezier(.22,.9,.22,1); position: absolute; left: 0; top: 0; box-shadow: 0 24px 68px rgba(17, 22, 33, .16); border-radius: 3px; will-change: transform; }
    .canvas-wrap.panning, .canvas-wrap.drawing { transition: none; }
    .canvas-stack { position: relative; background: #fff; background-image: none; user-select: none; touch-action: none; overflow: hidden; }
    .canvas-stack.transparent { background-color: #fff; background-image: linear-gradient(45deg, #e8eaee 25%, transparent 25%), linear-gradient(-45deg, #e8eaee 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #e8eaee 75%), linear-gradient(-45deg, transparent 75%, #e8eaee 75%); background-size: 24px 24px; background-position: 0 0, 0 12px, 12px -12px, -12px 0; }
    canvas { display: block; position: absolute; left: 0; top: 0; touch-action: none; }
    #guideCanvas { z-index: 1; pointer-events: none; }
    #drawCanvas { z-index: 2; }
    #tempCanvas { z-index: 3; pointer-events: none; }
    .mirror-line { position: absolute; top: 0; bottom: 0; width: 2px; background: rgba(93, 103, 255, .42); left: 50%; transform: translateX(-1px); z-index: 4; display: none; pointer-events: none; }
    .mirror-line.on { display: block; }
    .cursor-preview { position: absolute; z-index: 6; pointer-events: none; display: none; border: 1.5px solid rgba(22,25,31,.78); box-shadow: 0 0 0 1px rgba(255,255,255,.9), 0 4px 12px rgba(0,0,0,.12); transform: translate3d(0,0,0); mix-blend-mode: normal; }
    .cursor-preview.eraser { border-color: rgba(255,77,79,.84); background: rgba(255,255,255,.08); }
    .cursor-preview.square { border-radius: 4px; }
    .cursor-preview.round { border-radius: 999px; }
    .cursor-preview.soft-stamp { border: 1.5px solid rgba(22,25,31,.78); box-shadow: 0 0 0 1px rgba(255,255,255,.9), 0 4px 12px rgba(0,0,0,.12); background: transparent; mix-blend-mode: normal; opacity: 1; }
    .cursor-preview.soft-stamp.eraser { border-color: rgba(255,77,79,.84); background: rgba(255,255,255,.08); opacity: 1; }

    .floating-popover { position: fixed; z-index: 90; width: min(312px, calc(100vw - 18px)); padding: 13px; border-radius: 18px; background: rgba(255,255,255,.97); border: 1px solid rgba(203,209,220,.96); box-shadow: var(--shadow); display: none; backdrop-filter: blur(20px); max-height: calc(100dvh - 18px); overflow: auto; scrollbar-width: none; }
    .floating-popover::-webkit-scrollbar { display: none; }
    #bgPopover { width: min(312px, calc(100vw - 18px)); }
    .floating-popover.open { display: block; animation: pop .14s ease; }
    @keyframes pop { from { opacity: 0; transform: translateY(-4px) scale(.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .popover-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 14px; }
    .popover-title { font-weight: 950; font-size: 18px; }
    .popover-close { width: 34px; height: 34px; border-radius: 11px; display: grid; place-items: center; }
    .popover-close:hover { background: var(--panel-2); }
    .tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; background: var(--panel-3); padding: 4px; border-radius: 16px; margin-bottom: 14px; }
    .tab { height: 38px; border-radius: 12px; font-weight: 900; }
    .tab.active { background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    .hex-row { display: block; width: 100%; margin-top: 12px; }
    .hex-row input { width: 100%; min-width: 0; height: 44px; border-radius: 13px; border: 1px solid var(--line); padding: 0 12px; font-weight: 850; }
    .color-lab { display: grid; gap: 12px; width: 100%; min-width: 0; }
    #bgCustomPanel { width: 100%; min-width: 0; }
    .hue-strip { width: 100%; min-width: 0; height: 28px; border-radius: 9px; background: linear-gradient(90deg, #f00, #ff0, #0f0, #0ff, #00f, #f0f, #f00); position: relative; box-shadow: inset 0 0 0 1px rgba(0,0,0,.18); cursor: pointer; overflow: hidden; }
    .color-plane { width: 100%; min-width: 0; height: 176px; border-radius: 10px; position: relative; box-shadow: inset 0 0 0 1px rgba(0,0,0,.18); cursor: crosshair; overflow: hidden; }
    .color-plane::before { content: ""; position: absolute; inset: 0; background: linear-gradient(90deg, #fff, rgba(255,255,255,0)); }
    .color-plane::after { content: ""; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,0), #000); }
    .color-dot { position: absolute; width: 16px; height: 16px; border-radius: 50%; border: 3px solid #fff; box-shadow: 0 1px 6px rgba(0,0,0,.45); transform: translate(-50%, -50%); pointer-events: none; z-index: 2; }
    .text-editor { position: absolute; z-index: 8; min-width: 80px; min-height: 1.25em; padding: 4px 6px; outline: 2px solid rgba(55,103,255,.8); background: rgba(255,255,255,.12); color: var(--active-text-color, #000); cursor: text; white-space: pre-wrap; line-height: 1.25; user-select: text; touch-action: none; }
    .text-editor.dragging { cursor: grabbing; outline-style: dashed; }
    .image-upload-card { position: relative; min-height: 148px; border-radius: 18px; border: 2px dashed #c7ced9; background: #f8fafc; display: grid; place-items: center; overflow: hidden; cursor: pointer; color: #69717d; font-weight: 850; }
    .image-upload-card img { width: 100%; height: 100%; object-fit: contain; display: none; background: #fff; }
    .image-upload-card.has-image img { display: block; }
    .image-upload-card.has-image .image-upload-empty { display: none; }
    .image-remove-btn { position: absolute; right: 8px; top: 8px; width: 30px; height: 30px; border-radius: 999px; background: rgba(20,24,31,.88); color: #fff; display: none; place-items: center; z-index: 2; }
    .image-upload-card.has-image .image-remove-btn { display: grid; }
    .image-overlay { position: absolute; z-index: 7; border: 2px solid #3767ff; border-radius: 10px; background: rgba(255,255,255,.72); overflow: visible; cursor: move; box-sizing: border-box; touch-action: none; transform-origin: center center; }
    .image-overlay img { width: 100%; height: 100%; object-fit: contain; display: block; pointer-events: none; user-select: none; border-radius: 8px; overflow: hidden; }
    .image-handle { position: absolute; width: 14px; height: 14px; border-radius: 5px; background: #fff; border: 2px solid #3767ff; box-shadow: 0 2px 8px rgba(0,0,0,.16); z-index: 2; }
    .image-handle.nw { left: -8px; top: -8px; cursor: nwse-resize; }
    .image-handle.ne { right: -8px; top: -8px; cursor: nesw-resize; }
    .image-handle.sw { left: -8px; bottom: -8px; cursor: nesw-resize; }
    .image-handle.se { right: -8px; bottom: -8px; cursor: nwse-resize; }
    .image-rotate-line { position: absolute; right: -31px; top: -31px; width: 31px; height: 31px; border-top: 2px solid #3767ff; transform: rotate(45deg); transform-origin: left bottom; opacity: .75; pointer-events: none; }
    .image-rotate { position: absolute; right: -46px; top: -46px; width: 26px; height: 26px; border-radius: 999px; background: #fff; border: 2px solid #3767ff; box-shadow: 0 2px 10px rgba(0,0,0,.18); cursor: grab; display: grid; place-items: center; z-index: 3; }
    .image-rotate:active { cursor: grabbing; }
    .image-rotate svg { width: 15px; height: 15px; stroke: #3767ff; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

    .mobilebar { display: none; position: fixed; left: 10px; right: 10px; bottom: max(10px, env(safe-area-inset-bottom)); height: 66px; background: rgba(255,255,255,.94); border: 1px solid rgba(226,229,235,.94); box-shadow: var(--shadow); z-index: 45; border-radius: 22px; padding: 8px; gap: 6px; justify-content: space-between; backdrop-filter: blur(18px); }
    .mobilebar .tool-btn { width: 48px; min-height: 50px; grid-template-rows: 22px 16px; border-radius: 16px; }
    .mobilebar .tool-btn small { font-size: 11px; }
    .busy-overlay { position: fixed; inset: 0; z-index: 95; display: none; place-items: center; background: rgba(228, 230, 234, .36); backdrop-filter: blur(2px); pointer-events: all; }
    .busy-overlay.show { display: grid; }
    .busy-card { min-width: 190px; max-width: calc(100vw - 36px); padding: 16px 18px; border-radius: 20px; background: rgba(255,255,255,.96); border: 1px solid rgba(203,209,220,.92); box-shadow: var(--shadow); display: flex; align-items: center; gap: 13px; font-weight: 900; color: #252a34; }
    .busy-spinner { width: 22px; height: 22px; border-radius: 50%; border: 3px solid #dfe3ea; border-top-color: var(--brand); animation: busySpin .8s linear infinite; flex: 0 0 auto; }
    @keyframes busySpin { to { transform: rotate(360deg); } }
    .toast { position: fixed; left: 50%; bottom: 88px; transform: translateX(-50%) translateY(18px); background: rgba(20, 23, 30, .92); color: #fff; padding: 10px 14px; border-radius: 999px; box-shadow: var(--shadow); font-weight: 800; font-size: 13px; pointer-events: none; opacity: 0; transition: .22s ease; z-index: 100; max-width: calc(100vw - 24px); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .kbd { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; border: 1px solid #d7dbe3; border-bottom-width: 2px; border-radius: 7px; padding: 1px 6px; background: #fff; color: #4f5663; font-size: 12px; }

    @media (max-width: 980px) {
      :root { --panel-w: 306px; --rail-w: 60px; }
      .brand-title { display: none; }
      .panel-body { padding: 17px; }
      .swatches { grid-template-columns: repeat(auto-fit, minmax(38px, 1fr)); gap: 8px; }
      .swatch { max-width: 46px; }
      .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
    @media (max-width: 780px) {
      html, body { overflow: hidden; }
      :root { --top-h: 54px; }
      .topbar { padding: 0 10px; gap: 8px; }
      .top-actions { margin-left: auto; margin-right: 0; }
      #downloadBtn { width: 84px; min-width: 84px; height: 37px; padding: 0 13px; justify-content: center; }
      .doc-name input { width: auto; max-width: 46vw; font-size: 14px; padding: 7px 6px 7px 10px; }
      .top-actions .pill-btn:not(.primary) { display: none; }
      .app, .app.panel-collapsed { height: calc(100dvh - var(--top-h)); display: block; position: relative; }
      .rail { display: none; }
      .workspace { height: 100%; grid-template-rows: 44px 1fr; }
      .contextbar { padding: 0 10px; font-size: 13px; }
      .context-left { gap: 8px; }
      .stage-inner { padding: 22px 18px 104px; }
      .panel { position: fixed; left: 0; right: 0; bottom: calc(66px + env(safe-area-inset-bottom)); width: 100%; height: var(--mobile-panel-h, 25dvh); max-height: calc(100dvh - var(--top-h) - 66px - env(safe-area-inset-bottom)); min-height: 22px; border-right: 0; border-top: 1px solid var(--line); border-radius: 18px 18px 0 0; box-shadow: var(--shadow); z-index: 40; transform: translateY(calc(100% - 50px)); transition: transform .24s cubic-bezier(.2,.85,.2,1), opacity .18s ease, height .08s linear; }
      .panel.resizing { transition: transform .24s cubic-bezier(.2,.85,.2,1), opacity .18s ease; user-select: none; }
      .panel.handle-only { overflow: hidden; }
      .panel.handle-only .panel-head, .panel.handle-only .panel-body { opacity: 0; pointer-events: none; }
      .panel.open { transform: translateY(0); opacity: 1; pointer-events: auto; }
      .panel.closed { transform: translateY(102%); opacity: 0; pointer-events: none; }
      .panel::before { display: none; }
      .panel-drag-handle { display: grid; place-items: center; position: absolute; left: 0; right: 0; top: 0; height: 22px; z-index: 3; cursor: ns-resize; touch-action: none; }
      .panel-drag-handle::before { content: ""; width: 52px; height: 5px; border-radius: 999px; background: #c7ccd6; box-shadow: 0 1px 0 rgba(255,255,255,.85); }
      .panel-head { height: 50px; min-height: 50px; flex-basis: 50px; padding: 18px 16px 0; border-bottom: 0; }
      .panel-title { font-size: 18px; }
      .panel-body { padding: 11px 16px 18px; }
      .section[data-section="brush"] .control-block:has(#smoothRange) { display: none; }
      .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .section[data-section="shape"] .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)) !important; gap: 10px; }
      .section[data-section="shape"] .shape-card { min-height: 104px; padding: 10px 6px; }

      .ratio-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 9px; }
      .ratio-card { min-height: 86px; }
      .ratio-preview { width: 42px; height: 31px; }
      .swatches { grid-template-columns: repeat(auto-fit, minmax(42px, 1fr)); gap: 9px; }
      .swatch { max-width: 52px; border-radius: 14px; }
      .mobilebar { display: flex; left: 0; right: 0; bottom: 0; height: calc(66px + env(safe-area-inset-bottom)); border-radius: 0; border-left: 0; border-right: 0; border-bottom: 0; padding: 8px 10px calc(8px + env(safe-area-inset-bottom)); box-shadow: 0 -12px 36px rgba(15,19,32,.16); }
      .toast { bottom: calc(76px + env(safe-area-inset-bottom)); }
      .context-right .chip { display: none; }
    }
    @media (max-width: 430px) {
      .logo { width: 24px; height: 24px; }
      .doc-name input { max-width: 42vw; }
      .icon-btn { width: 34px; height: 34px; }
      .pill-btn { height: 34px; padding: 0 12px; }
      .panel-body { padding-left: 14px; padding-right: 14px; }
      .slider-control { grid-template-columns: minmax(0, 1fr) 76px; gap: 12px; }
      .number-input { width: 76px; }
      .swatches { grid-template-columns: repeat(auto-fit, minmax(36px, 1fr)); gap: 8px; }
      .section[data-section="shape"] .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)) !important; gap: 8px; }
      .section[data-section="shape"] .shape-card { min-height: 92px; border-radius: 16px; }

      .ratio-grid { gap: 8px; }
      .ratio-card { min-height: 78px; border-radius: 15px; padding: 8px 5px; }
      .ratio-preview { width: 38px; height: 28px; }
      .ratio-card strong { font-size: 14px; }
      .swatch { max-width: 46px; border-radius: 12px; }
      .mobilebar .tool-btn { width: 44px; }
      .mobilebar { left: 0; right: 0; }
    }
  </style>
</head>
<body>
  <header class="topbar" aria-label="主導覽列">
    <div class="logo" aria-hidden="true"></div>
    <div class="doc-name"><input id="docTitle" value="未命名作品" aria-label="文件名稱" /><span class="title-sizer" id="titleSizer"></span></div>
    <nav class="top-actions" aria-label="快速動作">
      <button class="icon-btn" id="undoBtn" title="復原 Ctrl+Z" aria-label="復原">↶</button>
      <button class="icon-btn" id="redoBtn" title="重做 Ctrl+Y" aria-label="重做">↷</button>
      <button class="pill-btn primary" id="downloadBtn">下載</button>
    </nav>
  </header>

  <main class="app" id="app">
    <aside class="rail" aria-label="工具列">
      <button class="tool-btn active" data-tool="brush" data-panel="brush" title="筆刷 B"><svg viewBox="0 0 24 24"><path d="M4 20c3.8.3 6.4-.6 7.7-2.7l7.1-9.7a2.7 2.7 0 0 0-4.2-3.3l-8.5 8.5C4.7 14.2 4 16.7 4 20Z"/><path d="M12 13l3.4 3.4"/></svg><small>筆刷</small></button>
      <button class="tool-btn" data-tool="eraser" data-panel="eraser" title="橡皮擦 E"><svg viewBox="0 0 24 24"><path d="M5.2 13.7 12.9 6a3.1 3.1 0 0 1 4.4 0l1.1 1.1a3.1 3.1 0 0 1 0 4.4l-6.7 6.7a3 3 0 0 1-2.1.9H5.4a1.4 1.4 0 0 1-1.4-1.4v-1.9c0-.8.3-1.5 1.2-2.1Z"/><path d="M10.2 8.7l5.1 5.1"/><path d="M12.6 19.1h6.8"/><path d="M4.2 21h3.2"/><circle cx="19.4" cy="17.1" r=".7"/></svg><small>橡皮擦</small></button>
      <button class="tool-btn" data-tool="fill" data-panel="fill" title="填滿 G"><svg viewBox="0 0 24 24"><path d="M4 12.5 12.5 4l7.5 7.5-8.5 8.5L4 12.5Z"/><path d="M8.5 8.5 15.5 15.5"/><path d="M19 17.5c1.2 1.3 1.8 2.2 1.8 3a1.8 1.8 0 0 1-3.6 0c0-.8.6-1.7 1.8-3Z"/></svg><small>填滿</small></button>
      <div class="rail-sep"></div>
      <button class="tool-btn" data-tool="shape" data-panel="shape" title="形狀 U"><svg viewBox="0 0 24 24"><rect x="4" y="5" width="7" height="7" rx="1.5"/><circle cx="16.5" cy="15.5" r="4"/><path d="M4 20 20 4"/></svg><small>形狀</small></button>
      <button class="tool-btn" data-tool="text" data-panel="text" title="文字 T"><svg viewBox="0 0 24 24"><path d="M5 5h14"/><path d="M12 5v14"/><path d="M8 19h8"/></svg><small>文字</small></button>
      <button class="tool-btn" data-tool="image" data-panel="image" title="影像"><svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="14" rx="2"/><path d="m7 16 4-4 3 3 2-2 3 3"/><circle cx="15.5" cy="9.5" r="1.4"/></svg><small>影像</small></button>
      <div class="rail-sep"></div>
      <button class="tool-btn" data-tool="template" data-panel="template" title="格式"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="3"/><path d="M4 10h16"/><path d="M10 10v10"/></svg><small>格式</small></button>
    </aside>

    <aside class="panel open" id="panel" aria-label="工具設定面板">
      <div class="panel-drag-handle" id="panelDragHandle" aria-hidden="true"></div>
      <div class="panel-head">
        <div class="panel-title" id="panelTitle">筆刷</div>
        <button class="panel-close" id="panelToggle" aria-label="關閉左側欄位">×</button>
      </div>
      <div class="panel-body">
        <section class="section active" data-section="brush">
          <div class="control-block"><div class="label-row"><label for="sizeRange">大小</label></div><div class="slider-control"><input id="sizeRange" type="range" min="1" max="220" value="18"><input class="number-input" id="sizeNumber" type="number" min="1" max="220" value="18"></div></div>
          <div class="control-block"><div class="label-row"><label for="opacityRange">不透明度</label></div><div class="slider-control"><input id="opacityRange" type="range" min="1" max="100" value="100"><input class="number-input" id="opacityNumber" type="number" min="1" max="100" value="100"></div></div>
          <div class="control-block"><div class="label-row"><label for="smoothRange">平滑控制</label></div><div class="slider-control"><input id="smoothRange" type="range" min="0" max="100" value="55"><input class="number-input" id="smoothNumber" type="number" min="0" max="100" value="55"></div></div>
          <div class="control-block"><div class="label-row"><span>顏色</span></div><div class="swatches" id="swatches"></div></div>
          <div class="control-block"><div class="label-row"><span>筆刷材質</span></div><div class="grid-2" id="brushStyles"></div></div>
        </section>

        <section class="section" data-section="eraser">
          <div class="control-block"><div class="label-row"><label for="eraserRange">橡皮擦大小</label></div><div class="slider-control"><input id="eraserRange" type="range" min="1" max="260" value="38"><input class="number-input" id="eraserNumber" type="number" min="1" max="260" value="38"></div></div>
          <div class="grid-2">
            <button class="brush-card active" data-eraser="hard"><svg viewBox="0 0 150 32"><path d="M10 19 C35 4, 70 14, 92 18 S127 14, 140 8" fill="none" stroke="#fff" stroke-width="16" stroke-linecap="round"/><path d="M10 19 C35 4, 70 14, 92 18 S127 14, 140 8" fill="none" stroke="#111" stroke-width="1.5" stroke-linecap="round" opacity=".45"/></svg><small>硬圓角</small></button>
            <button class="brush-card" data-eraser="soft"><svg viewBox="0 0 150 32"><path d="M10 19 C35 4, 70 14, 92 18 S127 14, 140 8" fill="none" stroke="#fff" stroke-width="18" stroke-linecap="round" opacity=".78"/><path d="M10 19 C35 4, 70 14, 92 18 S127 14, 140 8" fill="none" stroke="#111" stroke-width="1" stroke-linecap="round" opacity=".2"/></svg><small>柔和圓角</small></button>
          </div>
          <button class="chip danger full" id="clearBtn" style="margin-top:16px;">清除全部畫面</button>
        </section>

        <section class="section" data-section="fill">
          <div class="control-block"><div class="label-row"><span>填滿顏色</span></div><div class="swatches" id="fillSwatches"></div></div>
        </section>

        <section class="section" data-section="shape">
          <div class="control-block"><div class="label-row"><span>形狀類型</span></div><div class="grid-3">
            <button class="shape-card active" data-shape-type="line"><svg viewBox="0 0 64 40"><path d="M10 30 54 10"/></svg><small>線條</small></button>
            <button class="shape-card" data-shape-type="rect"><svg viewBox="0 0 64 40"><rect x="13" y="8" width="38" height="24" rx="4"/></svg><small>矩形</small></button>
            <button class="shape-card" data-shape-type="ellipse"><svg viewBox="0 0 64 40"><ellipse cx="32" cy="20" rx="21" ry="12"/></svg><small>圓形</small></button>
          </div></div>
          <div class="control-block"><div class="label-row"><span>形狀顏色</span></div><div class="swatches" id="shapeSwatches"></div></div>
          <div class="control-block"><div class="label-row"><label for="shapeSizeRange">線寬</label></div><div class="slider-control"><input id="shapeSizeRange" type="range" min="1" max="160" value="8"><input class="number-input" id="shapeSizeNumber" type="number" min="1" max="160" value="8"></div></div>
          <div class="control-block"><div class="label-row"><span>線條樣式</span></div><div class="segmented"><button class="chip active" data-line-style="solid">實線</button><button class="chip" data-line-style="dash">虛線</button><button class="chip" data-line-style="dot">點線</button></div></div>
          <div class="control-block" id="shapeModeBlock"><div class="label-row"><span>繪製方式</span></div><div class="segmented"><button class="chip active" data-shape-mode="stroke">外框</button><button class="chip" data-shape-mode="fill">填色</button><button class="chip" data-shape-mode="both">兩者</button></div></div>
        </section>

        <section class="section" data-section="text">
          <div class="field"><label for="textValue">文字內容</label><textarea id="textValue" data-default-text=""></textarea></div>
          <div class="grid-2"><div class="field"><label for="fontSize">字級</label><input id="fontSize" type="number" min="8" max="220" value="48"></div><div class="field"><label>字重</label><div class="segmented"><button class="chip" data-font-weight="500">M</button><button class="chip active" data-font-weight="700">B</button><button class="chip" data-font-weight="900">黑</button></div></div></div>
          <div class="control-block"><div class="label-row"><span>文字顏色</span></div><div class="swatches" id="textSwatches"></div></div>
          <div class="field"><label>字型</label><div class="font-family-row"><button class="chip active" style="font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif" data-font-family='"Noto Sans TC", "Microsoft JhengHei", sans-serif'>黑體</button><button class="chip" style="font-family:Georgia, 'Noto Serif TC', serif" data-font-family='Georgia, "Noto Serif TC", serif'>襯線</button></div></div>
        </section>

        <section class="section" data-section="template">
          <div class="control-block"><div class="label-row"><span>畫布比例</span></div><div class="ratio-grid">
            <button class="preset-card ratio-card" data-size="2048,1024"><span class="ratio-preview"><span class="ratio-box" style="width:46px;height:23px;"></span></span><strong>2:1</strong></button>
            <button class="preset-card ratio-card" data-size="1600,900"><span class="ratio-preview"><span class="ratio-box" style="width:46px;height:26px;"></span></span><strong>16:9</strong></button>

    function floodFillSmart(p) {

      $$('[data-shape-mode]').forEach(b => b.addEventListener('click', () => { state.shapeMode = b.dataset.shapeMode; $$('[data-shape-mode]').forEach(x => x.classList.toggle('active', x === b)); }));
      $$('[data-line-style]').forEach(b => b.addEventListener('click', () => { state.lineStyle = b.dataset.lineStyle; $$('[data-line-style]').forEach(x => x.classList.toggle('active', x === b)); }));
      $$('[data-font-weight]').forEach(b => b.addEventListener('click', () => { state.fontWeight = b.dataset.fontWeight; $$('[data-font-weight]').forEach(x => x.classList.toggle('active', x === b)); if (state.activeTextEditor) { state.activeTextEditor.dataset.weight = state.fontWeight; state.activeTextEditor.style.fontWeight = state.fontWeight; } }));
      $$('[data-font-family]').forEach(b => b.addEventListener('click', () => { state.fontFamily = b.dataset.fontFamily; $$('[data-font-family]').forEach(x => x.classList.toggle('active', x === b)); if (state.activeTextEditor) { state.activeTextEditor.dataset.family = state.fontFamily; state.activeTextEditor.style.fontFamily = state.fontFamily; } }));
      $$('[data-export]').forEach(b => b.addEventListener('click', () => { state.exportType = b.dataset.export; $$('[data-export]').forEach(x => x.classList.toggle('active', x === b)); }));
      $$('[data-size]').forEach(b => b.addEventListener('click', () => { const [w,h] = b.dataset.size.split(',').map(Number); state.docW = w; state.docH = h; setupCanvases(true); $$('[data-size]').forEach(x => x.classList.toggle('active', x === b)); }));
      $$('[data-guide]').forEach(b => b.addEventListener('click', () => { state.guide = b.dataset.guide; drawGuide(); $$('[data-guide]').forEach(x => x.classList.toggle('active', x === b)); }));
      $$('[data-eraser]').forEach(b => b.addEventListener('click', () => { state.eraser = b.dataset.eraser; $$('[data-eraser]').forEach(x => x.classList.toggle('active', x === b)); }));
      els.zoomBtn.addEventListener('click', e => {
        if (els.zoomMenu.classList.contains('open')) closeMenus();
        else { els.bgPopover.classList.remove('open'); openMenu(els.zoomMenu, e.currentTarget); }
      });
      document.addEventListener('pointerdown', e => {
        if (state.activeImageItem && !e.target.closest('.image-overlay') && !e.target.closest('#drawCanvas')) commitActiveImage();
        if (state.activeTextEditor && !e.target.closest('.text-editor') && !e.target.closest('#drawCanvas')) commitTextEditor();
        if (!e.target.closest('.menu') && !e.target.closest('.zoom-btn') && !e.target.closest('.floating-popover') && !e.target.closest('#bgToggle') && !e.target.closest('#panelBgBtn')) closeMenus();
      });
      els.canvas.addEventListener('pointerdown', pointerDown); els.canvas.addEventListener('pointermove', pointerMove); els.canvas.addEventListener('pointerleave', () => updateCursorPreview(null));
      window.addEventListener('pointerup', pointerUp); window.addEventListener('pointercancel', pointerUp); window.addEventListener('resize', () => { clearTimeout(bindUI.r); bindUI.r = setTimeout(() => fitToScreen(), 120); });
      els.stage.addEventListener('mousedown', e => { if (e.button === 1) e.preventDefault(); }); els.stage.addEventListener('auxclick', e => { if (e.button === 1) e.preventDefault(); });
      window.addEventListener('keydown', shortcuts); window.addEventListener('keyup', e => { if (e.code === 'Space') { state.spaceDown = false; updateCanvasCursor(); } });
      els.stage.addEventListener('wheel', e => { if (!e.ctrlKey && !e.metaKey) return; e.preventDefault(); setZoom(state.zoom * (e.deltaY > 0 ? .92 : 1.08), true); }, { passive: false });
      const activeTouches = new Map();
      els.stage.addEventListener('pointerdown', e => { if (e.pointerType === 'touch') activeTouches.set(e.pointerId, {x:e.clientX, y:e.clientY}); if (activeTouches.size === 2) { const pts = [...activeTouches.values()]; state.pinch = { dist: Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y), zoom: state.zoom }; state.isDrawing = false; } }, { passive: true });
      els.stage.addEventListener('pointermove', e => { if (!activeTouches.has(e.pointerId)) return; activeTouches.set(e.pointerId, {x:e.clientX, y:e.clientY}); if (activeTouches.size === 2 && state.pinch) { const pts = [...activeTouches.values()]; const d = Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y); setZoom(state.pinch.zoom * (d / state.pinch.dist), false); } }, { passive: true });
      ['pointerup','pointercancel','pointerleave'].forEach(name => els.stage.addEventListener(name, e => { activeTouches.delete(e.pointerId); if (activeTouches.size < 2) state.pinch = null; }, { passive: true }));
    }

    function bindMobilePanelResize() {
      if (!els.panelDragHandle) return;
      const isMobile = () => window.matchMedia('(max-width: 780px)').matches;
      const setMobilePanelHeight = px => {
        const bottomBar = 66 + (parseFloat(getComputedStyle(document.documentElement).getPropertyValue('padding-bottom')) || 0);
        const min = 22;
        const max = Math.max(240, window.innerHeight - (parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--top-h')) || 54) - bottomBar);
        const h = Math.max(min, Math.min(max, px));
        document.documentElement.style.setProperty('--mobile-panel-h', h + 'px');
        els.panel.classList.toggle('handle-only', h <= 36);
      };
      els.panelDragHandle.addEventListener('pointerdown', e => {
        if (!isMobile()) return;
        e.preventDefault();
        els.panelDragHandle.setPointerCapture?.(e.pointerId);
        const startY = e.clientY;
        const startH = els.panel.getBoundingClientRect().height;
        els.panel.classList.add('resizing');
        const move = ev => setMobilePanelHeight(startH + (startY - ev.clientY));
        const up = ev => {
          els.panel.classList.remove('resizing');
          els.panelDragHandle.releasePointerCapture?.(ev.pointerId);
          window.removeEventListener('pointermove', move);
          window.removeEventListener('pointerup', up);
          window.removeEventListener('pointercancel', up);
        };
        window.addEventListener('pointermove', move, { passive: false });
        window.addEventListener('pointerup', up);
        window.addEventListener('pointercancel', up);
      });
      window.addEventListener('resize', () => {
        if (isMobile()) setMobilePanelHeight(Math.min(els.panel.getBoundingClientRect().height || window.innerHeight * .25, window.innerHeight));
      });
    }

    function invalidateSoftBrush() {
      state.softBrushStampKey = '';
      state.softBrushStamp = null;
      updateCanvasCursor();
    }

    function shortcuts(e) { if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') { e.preventDefault(); return e.shiftKey ? redo() : undo(); } if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'y') { e.preventDefault(); return redo(); } if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') { e.preventDefault(); return exportCanvas(); } if (e.code === 'Space' && !['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) { e.preventDefault(); state.spaceDown = true; updateCanvasCursor(); } if (['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) return; const key = e.key.toLowerCase(); const map = { b:['brush','brush'], e:['eraser','eraser'], g:['fill','fill'], u:['shape','shape'], t:['text','text'], i:['eyedrop',state.panel || 'brush'] }; if (map[key]) setTool(map[key][0], map[key][1]); if (key === 'l') { state.shapeType = 'line'; setTool('shape','shape'); } if (key === 'r') { state.shapeType = 'rect'; setTool('shape','shape'); } if (key === 'o') { state.shapeType = 'ellipse'; setTool('shape','shape'); } if (key === '+' || key === '=') setZoom(state.zoom * 1.1); if (key === '-') setZoom(state.zoom / 1.1); if (key === '0') fitToScreen(); }

    function updateTitleWidth() {
      if (!els.titleSizer) return;
      els.titleSizer.textContent = els.docTitle.value || els.docTitle.placeholder || '未命名';
      const width = Math.ceil(els.titleSizer.getBoundingClientRect().width) + 24;
      els.docTitle.style.width = Math.min(Math.max(width, 72), Math.min(520, window.innerWidth * .58)) + 'px';
    }
    function init() { refreshColorUI(); drawBrushCards(); renderZoomMenu(); updateToggles(); bindUI(); setupCanvases(false); updateCanvasCursor(); updateActionStates(); updateTitleWidth(); toast('繪圖系統已就緒'); }
    init();
  </script>
